# Render Blueprint — deploy with one click from the repo.
# In Render: New + -> Blueprint -> connect this GitHub repo.
services:
  - type: web
    name: fao56-irrigation
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      # Set a stable secret so login tokens survive restarts.
      - key: SECRET_KEY
        generateValue: true
      # Change the default admin credentials in production.
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
